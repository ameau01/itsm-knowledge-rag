# One-command stack for the ITSM Knowledge Search app.
#
#   cp .env.example .env                 # required for config (ports etc.); NO LLM key needed
#   docker compose up rag-demo           # mock: store from SQL seeds — no HF, no redaction, no key
#   docker compose up rag-live           # live: tickets from HF + redaction; L2 from SQL seeds, no key
#     (first run auto-builds the image and starts qdrant; add --build only to force a rebuild)
#   docker compose up -d qdrant          # just the vector store (for local `uv` runs)
#   docker compose down                  # stop    |   docker compose down -v   # + wipe data
#
# Open http://localhost:8000  (override with SUPPORT_VIEW_PORT in .env).
#
# Neither app image needs an LLM key: L2 curation + overview ship as committed SQL seeds (db_seeds/),
# and the embedding model is baked into the image at build time. The app services talk to the qdrant
# service over the network (server mode), so there is no embedded on-disk lock. Named volumes:
#   qdrant_storage  the vector index      op_store  redacted tickets (SQLite)
#   hf_cache        embedding model (baked into the image; live also caches the HF corpus here)

x-app: &app
  build: .
  image: itsm-knowledge-rag:latest
  env_file: .env
  depends_on:
    - qdrant
  environment: &app-env
    QDRANT_LOCAL: "false"
    QDRANT_URL: "http://qdrant:6333"
    OPERATIONAL_STORE: "/app/.operational_store"
    HF_HOME: "/app/.hf_cache"
    SUPPORT_VIEW_PORT: "${SUPPORT_VIEW_PORT:-8000}"
  ports:
    - "${SUPPORT_VIEW_PORT:-8000}:${SUPPORT_VIEW_PORT:-8000}"
  volumes:
    - hf_cache:/app/.hf_cache
    - op_store:/app/.operational_store

# The wiki reads the operational store, not Qdrant — so no qdrant dependency, no index.
# wiki-demo is a LEAN image (mkdocs only) that serves the committed pages; wiki-live shares the
# BEEFY rag image so it can ingest + render from the store before serving.
services:
  qdrant:
    image: qdrant/qdrant:v1.12.0     # any server >= 1.10 (hybrid Query API + sparse IDF); bump as desired
    container_name: itsm_qdrant
    ports:
      - "6333:6333"                  # REST + dashboard (http://localhost:6333/dashboard)
      - "6334:6334"                  # gRPC
    volumes:
      - qdrant_storage:/qdrant/storage
    restart: unless-stopped

  rag-live:
    <<: *app
    container_name: rag-live
    environment:
      <<: *app-env
      PIPELINE_MODE: "live"

  rag-demo:                        # LEAN-ER rag image: vector-DB search UI, but no wiki/mkdocs group.
    <<: *app
    container_name: rag-demo
    build:
      context: .
      args:
        SYNC_GROUPS: "--group retrieval --group app"
    image: itsm-knowledge-rag-demo:latest
    environment:
      <<: *app-env
      PIPELINE_MODE: "mock"

  wiki-demo:                       # LEAN image (mkdocs only) — serve committed mkdocs/. Fast build, no ML deps, no DB.
    build:
      context: .
      dockerfile: Dockerfile.wiki
    image: itsm-knowledge-wiki:latest
    container_name: wiki-demo
    env_file: .env
    environment:
      WIKI_VIEW_PORT: "${WIKI_VIEW_PORT:-8001}"
      PIPELINE_MODE: "mock"
    ports:
      - "${WIKI_VIEW_PORT:-8001}:${WIKI_VIEW_PORT:-8001}"

  wiki-live:                       # BEEFY shared image — ingest + render from the store, then serve .mkdocs
    build: .
    image: itsm-knowledge-rag:latest
    container_name: wiki-live
    env_file: .env
    entrypoint: ["sh", "scripts/run_wiki.sh"]
    environment:
      OPERATIONAL_STORE: "/app/.operational_store"
      WIKI_VIEW_PORT: "${WIKI_VIEW_PORT:-8001}"
      PIPELINE_MODE: "live"
    ports:
      - "${WIKI_VIEW_PORT:-8001}:${WIKI_VIEW_PORT:-8001}"
    volumes:
      - hf_cache:/app/.hf_cache
      - op_store:/app/.operational_store

volumes:
  qdrant_storage:
  hf_cache:
  op_store:
