# Redaction policy for the ITSM RAG ingest pipeline.
#
# This file drives the Presidio-based redactor. It maps entity types to
# replacement tokens, and documents composite and retain cases.
#
# Ground truth: the pii.json sidecar was authored independently of this file.
# The redactor is graded against pii.json — it cannot grade itself.
# See docs/redaction-policy.md for the policy rationale.
#
# Layer attribution used throughout this file:
#   Layer 1 (sidecar): deterministic lookup against pii.json; precision = 1.0
#                      for all injected values. This is the real eval guarantee.
#   Layer 2 (Presidio): pattern-based fallback for residual PII not in the
#                       sidecar. Best-effort; does NOT raise the eval bar.
# Rules marked "Layer 1 only" are enforced by sidecar text replacement and
# are NOT wired into the Presidio pipeline.

# ── Token vocabulary ──────────────────────────────────────────────────────────
# Exactly these 8 tokens. Any other <TOKEN> string is a vocab mismatch failure.
token_vocabulary:
  - <PERSON>
  - <USER>
  - <EMAIL>
  - <PHONE>
  - <EMP_ID>
  - <LOCATION>
  - <IP>
  - <HOSTNAME>

# ── Entity → token mapping ────────────────────────────────────────────────────
# sidecar_type: the "type" field in pii.json
# presidio_entity: the Presidio entity type; "SIDECAR_ONLY" means no Layer 2
# token: replacement token emitted by both layers
# layer2: true if a Layer 2 (Presidio) recognizer is wired for this type
entities:
  - sidecar_type: email
    presidio_entity: EMAIL_ADDRESS
    token: <EMAIL>
    layer2: true
    notes: >
      Whole-string replacement. Consumes local-part + domain together.
      Built-in Presidio recognizer — no custom recognizer needed.

  - sidecar_type: person
    presidio_entity: PERSON
    token: <PERSON>
    layer2: true
    notes: >
      Built-in spaCy NER. Unreliable on technical text; sidecar is the
      authoritative source. Layer 2 catches bare names the sidecar misses.

  - sidecar_type: username
    presidio_entity: SIDECAR_ONLY
    token: <USER>
    layer2: false
    notes: >
      USERNAME is NOT wired into Layer 2. No pattern-based recognizer can
      reliably distinguish corporate usernames (mwilliams, pnair) from
      ordinary English words without a known-username allowlist. Any regex
      broad enough to catch short lowercase usernames fires on 'connected',
      'session', 'certificate', etc. — the technical vocabulary that is the
      entire knowledge value of this system. Layer 1 (sidecar) covers all
      injected usernames with precision = 1.0. Residual bare usernames that
      are absent from the sidecar are accepted as a known gap.

  - sidecar_type: emp_id
    presidio_entity: EMPLOYEE_ID
    token: <EMP_ID>
    layer2: false
    notes: >
      EMPLOYEE_ID is NOT wired into Layer 2. All 925 injected EMP_IDs are
      captured by the pii.json sidecar (Layer 1) — Gate 1 confirms zero leaks.
      The [A-Z]{1,4}-\d{4,6} pattern is too broad: it falsely matches change
      tickets (CHG-XXXXX), incident IDs (INC-PDQ-XXXX substrings), error codes
      (RST-XXXXX), structured hostnames (WKS-PDX-41827 → PDX-41827 matches),
      and region-prefixed identifiers (EMEA-4417). Removing from Layer 2
      eliminates ~155 retention false-positives with no Gate 1 coverage loss.

  - sidecar_type: hostname
    presidio_entity: PERSONAL_HOSTNAME
    token: <HOSTNAME>
    layer2: true
    notes: >
      Custom recognizer for WORKSTATION-*/LAPTOP-* style fused tokens.
      Lowercase personal hostnames (mreeves-pc.corplabs.internal) are NOT
      caught by this recognizer — they are accepted as a known Layer 2 gap.
      The sidecar covers all injected personal hostnames.

  - sidecar_type: ip
    presidio_entity: IP_ADDRESS
    token: <IP>
    layer2: false
    notes: >
      IP_ADDRESS is NOT wired into Layer 2. All PII IPs (personal workstation
      and laptop addresses) are captured by the pii.json sidecar (Layer 1) —
      Gate 1 confirms zero leaks. Infrastructure server IPs (DNS resolvers,
      gateways, domain controllers) appear in retention.json as service_hostname
      values and must be retained. The IP pattern cannot distinguish personal vs.
      infrastructure IPs, so Layer 2 would cause ~11 false-positive retention
      drops with no coverage gain. Same design rationale as EMPLOYEE_ID.

  - sidecar_type: location
    presidio_entity: LOCATION
    token: <LOCATION>
    layer2: true
    notes: Built-in spaCy NER; city/locality names.

  - sidecar_type: phone
    presidio_entity: PHONE_NUMBER
    token: <PHONE>
    layer2: true
    notes: >
      Built-in Presidio recognizer. Extensions (x4417) are not caught;
      accepted as a known Layer 2 gap. Sidecar covers injected phone values.

# ── Composite and hard-case rules ─────────────────────────────────────────────
# Documents how each composite case is handled, and which layer enforces it.
composite_rules:

  - name: dn_cn_extract
    layer: Layer 1 only
    description: >
      Distinguished Name: CN=mdelgado,OU=Corp Users → CN=<USER>,OU=Corp Users.
      The pii.json sidecar stores the bare CN value ('mdelgado'), not the full
      DN string. Layer 1 replaces the value wherever it appears; because the CN
      value appears verbatim inside the DN string, the replacement fires there
      too. The OU= and DC= components are not in the sidecar and survive.
      Layer 2 (Presidio) does NOT do group-level DN extraction — no regex
      targeting CN= is wired into _build_presidio_analyzer.
    enforced_by: Layer 1 sidecar lookup (value = bare CN string)

  - name: personal_hostname_fused
    layer: Layer 2 (PERSONAL_HOSTNAME recognizer) + Layer 1
    description: >
      Uppercase fused hostname (WORKSTATION-PNAIR-L14): whole token replaced
      with <HOSTNAME>. Layer 2 fires for WORKSTATION-*/LAPTOP-*/DESKTOP-*
      prefixes. Lowercase personal hostnames (mreeves-pc.corplabs.internal)
      rely on Layer 1 only — the Layer 2 recognizer does not cover them.
    enforced_by: Layer 2 PersonalHostnameRecognizer + Layer 1 sidecar

  - name: email_consumes_username
    layer: Layer 1 only
    description: >
      The username local-part of an email is consumed by <EMAIL> whole-string.
      In Layer 1 this is enforced by longest-value-first ordering: the full
      email address (longer) is replaced before the bare username (shorter).
      Layer 2 uses Presidio's built-in EMAIL_ADDRESS recognizer, which also
      consumes the whole string. There is no USERNAME recognizer in Layer 2
      to conflict with it.
    enforced_by: Layer 1 longest-value-first; Layer 2 EMAIL_ADDRESS spans

  - name: domain_inside_email
    layer: Layer 1 only
    description: >
      The corporate domain inside an email is consumed with the local-part
      (whole-string replacement). Bare domain occurrences outside email
      context (sso.corplabs.com, DC=corplabs) are RETAIN — they are not in
      the sidecar and the Layer 2 suppression list protects service URLs.
    enforced_by: Layer 1 sidecar (email stored as full address string)

# ── Retain classes (must NOT be redacted) ─────────────────────────────────────
retain_classes:
  - type: system_or_app_name
    examples: [GlobalProtect, Active Directory, Intune, Azure AD, Okta]

  - type: vendor_identity
    description: >
      Vendor name, domain, service URL, and portal reference are atomic.
      Retain all or none.
    examples: [Meridian, Meridian API, api.meridiandata.io]

  - type: shared_service_hostname
    examples: ["DC-EAST-03.corplabs.internal", "sso.corplabs.com", "ldap.corp.local"]

  - type: error_or_event_id
    examples: ["0xC0000234", AUTH_EXPIRED, "VPN-ERR-201", "504 Gateway Timeout"]

  - type: cert_serial
    examples: ["4A:7C:91:DE", "01:FD:6D:30"]

  - type: os_or_device_class
    examples: ["Windows 11", "macOS Ventura", "Dell Latitude"]

  - type: region
    description: >
      Organizational region or group names. Corpus values are word-form
      (Americas, EMEA, EMEA-Sales) not cloud-style codes (us-east-1).
    examples: [Americas, EMEA, "EMEA-Sales", "Eng-US-East", "Finance-US-East"]

  - type: facility
    description: Infrastructure locations — locate equipment, not people.
    examples: ["DNS Resolver cluster", "Driver Package repository", "EMEA RemoteWorkers"]

# ── False-positive suppressions (Layer 2 only) ───────────────────────────────
# Applied to Presidio results before anonymization.
# Suppression uses re.fullmatch on the matched span — be precise.
# An over-broad suppression is a leak path: it can silently drop a true PII
# detection. Every pattern here must be verified against real corpus values.
#
# Note: USERNAME is not in Layer 2, so no suppression is needed for it.
# EMP_ID format overlaps are not a concern here because the EmployeeIdRecognizer
# patterns are specific enough not to fire on the values below.
false_positive_suppressions:

  - pattern: '0x[0-9A-Fa-f]+'
    reason: Hex error codes (0xC0000234, 0x000006BA) flagged as PERSON by spaCy
    must_retain: true

  - pattern: 'https?://\S+'
    reason: Service URLs — retain unless URL embeds personal data
    must_retain: true

  - pattern: '[0-9A-Fa-f]{2}(:[0-9A-Fa-f]{2})+'
    reason: Cert serials and MAC addresses
    must_retain: true

  - pattern: '(Americas|EMEA|EMEA-Sales|Eng-US-East|Finance-US-East|Finance-US-East-Win11-Compliance|APAC|AMER)'
    reason: >
      Explicit allowlist of organization region names from the corpus.
      Replaced the shape-based [A-Z]{2,6} pattern which matched PERSON,
      ADMIN, VPN, OKTA and was a leak path.
    must_retain: true

  - pattern: '(us-east-1|us-west-2|eu-west-1|ap-southeast-1)'
    reason: AWS-style region codes (not currently in corpus but reserved)
    must_retain: true

  - pattern: '[a-zA-Z0-9._%+\-]+@(corplabs\.com|corp\.internal|example\.corp|partnerservices\.net|corplabs\.internal|corp\.local|externalpay\.io|databridge\.io)'
    reason: >
      Infrastructure and service-team email addresses (infra-alerts@corplabs.com,
      dns-ops@corp.internal, etc.) — not personal PII. All personal emails in the
      corpus are captured by the pii.json sidecar (Layer 1); any email still
      present after Layer 1 ran is a service address and must be retained.
      Pattern covers all known corpus infrastructure domains.
    must_retain: true

# ── Custom recognizer specs (Layer 2) ─────────────────────────────────────────
# Each entry is a PatternRecognizer wired into _build_presidio_analyzer().
# Patterns verified against the actual corpus (pii.json, 213 EMP_ID values).
custom_recognizers:

  - name: EmployeeIdRecognizer
    entity: EMPLOYEE_ID
    description: >
      Corporate employee ID. Three formats observed in the corpus (213 values):
        Standard hyphenated:   E-12345, EMP-40821, DVP-2294   (91%)
        Two-segment hyphenated: EP-NA-04821                    (<1%)
        No-hyphen:             E20481, E50832                  (3%)
      Pattern verified against all 213 corpus EMP_IDs — 100% coverage.
    patterns:
      - name: emp_id_standard
        regex: '\b[A-Z]{1,4}-\d{4,6}\b'
        score: 0.92
        notes: Covers E-12345, EMP-40821, DVP-2294, AE-40218

      - name: emp_id_two_segment
        regex: '\b[A-Z]{1,4}-[A-Z]{2}-\d{4,6}\b'
        score: 0.92
        notes: Covers EP-NA-04821 style

      - name: emp_id_no_hyphen
        regex: '\b[A-Z]\d{5}\b'
        score: 0.85
        notes: Covers E20481, E50832 — lower score, shorter pattern

  - name: PersonalHostnameRecognizer
    entity: PERSONAL_HOSTNAME
    description: >
      Hostnames that fuse a person's name into the token (uppercase prefix style).
      Lowercase personal hostnames (mreeves-pc.corplabs.internal) are a known
      gap — Layer 1 sidecar covers the injected instances.
    patterns:
      - name: workstation_prefix
        regex: '\b(WORKSTATION|LAPTOP|DESKTOP|WS|PC)-[A-Z][A-Z0-9\-]{2,}\b'
        score: 0.90
        notes: >
          Deliberately conservative threshold. Better to miss an edge-case
          personal hostname than to redact a service hostname like DC-EAST-03.
