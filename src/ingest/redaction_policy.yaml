# в”Ђв”Ђ Redaction Workflowв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
#
#   Layer 1: AD identity lookup (exact match)
#     Source: users_directory.json вЂ” the synthesised corporate AD export,
#             hosted on HuggingFace and Kaggle alongside the ticket corpus.
#             At runtime run_ingest.py loads it from the HF snapshot and
#             passes it to PolicyRedactor(directory=...).
#             In production: replace with live Get-ADUser export or LDAP query.
#     Attributes в†’ tokens:
#       username      (sAMAccountName) в†’ <USER>
#       display_name  (displayName)    в†’ <PERSON>
#       email         (mail)           в†’ <EMAIL>
#
#   Layer 2: Format-based rules (regex)
#     Covers PII with a structural signature AD does not supply.
#
#   Layer 3: Presidio NER (catch-all)
#     Informal name references, international phone formats, residual PII.
#
# в”Ђв”Ђ Evaluation в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
#   pii.json / retention.json are eval yardsticks вЂ” NOT runtime inputs.
#   Run: uv run python3 -m ingest.score   to score against the eval set.

version: "2.0"

token_vocabulary:
  - <PERSON>
  - <USER>
  - <EMAIL>
  - <PHONE>
  - <EMP_ID>
  - <LOCATION>
  - <IP>
  - <HOSTNAME>

# в”Ђв”Ђ Layer 1: AD identity в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
# Source path is a fallback for local dev only; at runtime the caller passes
# the pre-loaded directory dict via PolicyRedactor(directory=...).
ad_identity:
  # source is unused at runtime вЂ” run_ingest.py and score.py load users_directory.json
  # from the HF snapshot and pass it via PolicyRedactor(directory=...).
  source: "users_directory.json"

  attributes:
    # email MUST run first вЂ” it consumes the full "local@domain" string before
    # the username rule can match the local part alone (which would leave @domain
    # dangling as <USER>@corplabs.com instead of the correct <EMAIL> token).
    - ad_attr: mail
      yaml_key: email
      token: <EMAIL>
      case_sensitive: false
      whole_word: false

    - ad_attr: displayName
      yaml_key: display_name
      token: <PERSON>
      case_sensitive: false
      whole_word: true

    - ad_attr: sAMAccountName
      yaml_key: username
      token: <USER>
      case_sensitive: true
      whole_word: true

# в”Ђв”Ђ Layer 2: Format-based rules в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
format_rules:

  # Email format rule removed: AD Layer 1 covers all personal emails at 100%.
  # Any email surviving Layer 1 is a service/infrastructure address and must
  # be retained. See Presidio false_positive_suppressions for the email guard.

  - name: emp_id
    token: <EMP_ID>
    priority: 20
    patterns:
      - '\b(E|EMP|DI|DVP|AE|ENG|EP|EXT|FIN|LPT|MKT|NE|NET|N|S|SE|SLS|WS)-\d{5,6}\b'
      - '\b(E|EMP|DI|DVP|AE|EXT|FIN|MKT|NE|NET|N|S|SE|SLS)-\d{4}\b'
      - '\bE\d{5}\b'
      - '\bEP-[A-Z]{2}-\d{4,6}\b'

  - name: hostname
    token: <HOSTNAME>
    priority: 30
    patterns:
      - '\b(WORKSTATION|LAPTOP|DESKTOP|APPNODE|IPHONE|IPAD|ANDROID)-[A-Z0-9][A-Z0-9\-]{2,}\b'
      - '\b[a-z]{3,12}-(pc|laptop|ws|wks|desktop)\.[a-z][a-z0-9.\-]+\b'

  - name: ip
    token: <IP>
    priority: 40
    patterns:
      - '\b(?:\d{1,3}\.){3}\d{1,3}\b'

  - name: phone
    token: <PHONE>
    priority: 50
    patterns:
      - '\+1[-.\s]\d{3}[-.\s]\d{3}[-.\s]\d{4}\b'
      - '\b\d{3}[-.\s]\d{3}[-.\s]\d{4}\b'
      - '\(\d{3}\)\s?\d{3}[-.\s]\d{4}\b'
      - '\bext(?:ension)?\.?\s+\d{3,5}(?:-\d{1,4})?\b'

  - name: location
    token: <LOCATION>
    priority: 60
    patterns:
      - '\b(Arlington|Ashburn|Atlanta|Austin|Bangalore|Birmingham|Boston|Bristol|Budapest|Charlotte|Chicago|Columbus|Dallas|Denver|Dubai|Dublin|Durham|Edinburgh|Frankfurt|Houston|Leeds|London|Lyon|Manhattan|Milan|Minneapolis|Munich|Newark|Philadelphia|Phoenix|Portland|Raleigh|Reading|Reston|Richmond|Sacramento|Seattle|Singapore|Stockholm|Toronto|Zagreb|Zurich)\b'
      - 'NYC'
      - 'New York'
      - 'SГЈo Paulo'
      - 'EMEA-Office-1'
      - 'Building 3'
      - 'Building 4'
      - 'Floor2'
      - 'HQ - Building A, Floor 3'

# в”Ђв”Ђ Layer 3: Presidio NER в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
presidio:
  # Per-entity confidence thresholds applied after Presidio returns results.
  # score_threshold=None lets each recognizer use its own built-in floor
  # (important for PHONE: international formats score below 0.5 but above
  # the phone recognizer's floor). Only entities listed here get an extra floor.
  per_entity_threshold:
    PERSON: 0.75

  entities:
    - presidio_entity: PERSON
      token: <PERSON>
      notes: >
        Catch-all for informal name references not in AD ("talked to John").
        AD display_name exact match already achieves 100% recall on formal names.
        Threshold 0.75 filters technical-term FPs (Linux, Kubernetes, etc.).
    - presidio_entity: EMAIL_ADDRESS
      token: <EMAIL>
      notes: >
        Catch-all for personal emails not in the AD export (contractors, etc.).
        AD email attribute already achieves 100% recall for known corporate emails.
    - presidio_entity: PHONE_NUMBER
      token: <PHONE>
      notes: >
        Primary value of Presidio in this corpus: international phone formats
        (+65-9173-4028 etc.) that format rules don't cover.
    # LOCATION excluded from Presidio вЂ” L2 format rules cover the office location
    # list at 99.9% recall. Presidio LOCATION over-fires on cloud region codes
    # (us-east-1) and infrastructure names, dropping region retention to 82.7%.

  custom_recognizers:
    - name: PersonalHostnameRecognizer
      entity: PERSONAL_HOSTNAME
      token: <HOSTNAME>
      patterns:
        - name: device_prefix
          regex: '\b(WORKSTATION|LAPTOP|DESKTOP|IPHONE|IPAD|ANDROID|WS|PC)-[A-Z][A-Z0-9\-]{2,}\b'
          score: 0.90

  false_positive_suppressions:
    - pattern: '<[A-Z_]+>'
      reason: Already-redacted tokens вЂ” do not re-process

    - pattern: '\d{8,}'
      reason: >
        8+ digit all-numeric strings are date-based event IDs and timestamps,
        not phone numbers. Real phone numbers have separators.

    - pattern: '0x[0-9A-Fa-f]+'
      reason: Hex error codes (0xC0000234) flagged as PERSON by spaCy

    - pattern: '[0-9A-Fa-f]{2}(:[0-9A-Fa-f]{2})+'
      reason: Cert serials and MAC addresses

    - pattern: 'https?://\S+'
      reason: Service URLs вЂ” retain unless URL embeds personal data

    # NOTE: no email suppression here.
    # The AD directory has an intentional 8.2% gap (contractors, recent leavers, service accounts).
    # Personal emails of gap users are not caught by L1 and must fall through to Presidio.
    # Service/infrastructure emails (dns-ops@corplabs.com etc.) will also be redacted вЂ” small
    # retention cost (~11 entries), acceptable given the PII recall requirement.

    - pattern: '(?:DC|OU|CN)=[a-zA-Z0-9][a-zA-Z0-9.\-]*'
      reason: LDAP distinguished name components

    - pattern: '(Americas|EMEA|EMEA-Sales|Eng-US-East|Finance-US-East|Finance-US-East-Win11-Compliance|APAC|AMER)'
      reason: Organizational region and group names

    - pattern: '[a-z]{2,3}-[a-z]+-\d+'
      reason: Cloud region codes (us-east-1, eu-west-2, ap-southeast-1, etc.)

    - pattern: '[a-z]{2,3}-[a-z]+-\d+-[a-z0-9]+'
      reason: Datacenter sub-region codes (us-east-1-dc1, us-east-1a, etc.)

    - pattern: '(Linux|Kubernetes|Windows|macOS|Android|iOS|Ubuntu|Debian|CentOS|RHEL|Fedora)'
      reason: OS names that spaCy NER flags as PERSON or ORG

    - pattern: '(Mail|Outlook|Chrome|Firefox|Safari|Teams|Slack|Zoom|Excel|Word|PowerPoint)'
      reason: Application names flagged as PERSON by spaCy

    - pattern: '(ADUC|SCCM|WSUS|SCOM|LAPS|BitLocker|Intune|Azure|Okta|GlobalProtect)'
      reason: IT system/tool names flagged as PERSON or ORG

    - pattern: '[A-Z]{2,6}_[A-Z][A-Z_]+'
      reason: SCREAMING_SNAKE_CASE error/event codes (AUTH_EXPIRED, MDM_EncryptionSignalMissing)

    - pattern: '[A-Z]{2,6}-\d{4,6}'
      reason: >
        Event/error ID format (RST-88501, SYNC-4402) вЂ” emp_id rules run before
        Presidio so true emp_ids are already <EMP_ID> by this point; anything
        matching here is a non-emp_id technical code that must be retained.
