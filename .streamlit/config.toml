# Read when Streamlit is launched from the repo root (where the run scripts run).
# A copy also lives in streamlit_app/.streamlit/ for running from that directory.

[theme]
base            = "light"
primaryColor    = "#1a0dab"
backgroundColor = "#ffffff"
secondaryBackgroundColor = "#f8f9fa"
textColor       = "#202124"
font            = "sans serif"

[server]
headless = true
# Don't hot-reload: the auto watcher walks every transformers module on import, and the
# vision image-processors (torchvision) we never use throw noisy ModuleNotFoundErrors.
fileWatcherType = "none"

[browser]
gatherUsageStats = false

[client]
# Hide the developer toolbar (Deploy button, hamburger menu) and its keyboard shortcuts,
# including "C" = clear caches and "R" = rerun, which fire when copying text with Cmd/Ctrl+C.
toolbarMode = "minimal"
