name: Lint, Type-check & Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Install dependencies
        run: uv sync

      # Cache the HF dataset snapshot across CI runs. Without this, every
      # push fetches the dataset fresh, which trips HF's rate limit
      - name: Cache HF dataset
        uses: actions/cache@v4
        with:
          path: .hf_cache
          key: hf-cache-v2-${{ hashFiles('src/data_loader.py') }}
          restore-keys: |
            hf-cache-v2-

      - name: Download HF dataset (if not cached)
        env:
          HF_HOME: .hf_cache
        run: |
          HF_SNAPSHOTS=".hf_cache/datasets--ameau01--synthetic-it-support-tickets/snapshots"
          # Require users_directory.json to be present — old v1 snapshots lacked it.
          USERS_FILE=$(find "$HF_SNAPSHOTS" -name "users_directory.json" 2>/dev/null | head -1)
          if [ -z "$USERS_FILE" ]; then
            echo "HF snapshot missing or outdated — downloading."
            uv run sh scripts/test_hf_download.sh
          else
            echo "HF dataset found in cache (users_directory.json present) — skipping download."
          fi

      - name: Run linting (ruff)
        run: uv run ruff check .

      - name: Run type checking (mypy)
        run: uv run mypy src

      - name: Run tests
        env:
          HF_HOME: .hf_cache
        run: uv run pytest -q --junitxml=test-results.xml

      - name: Test summary
        uses: test-summary/action@v2
        if: always()
        with:
          paths: "test-results.xml"

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: test-results.xml

